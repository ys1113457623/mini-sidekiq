services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dummy
      POSTGRES_PASSWORD: dummy
      POSTGRES_DB: dummy_rails_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dummy -d dummy_rails_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Rails web server (port 3000)
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: dummy-rails-app:dev
    command: bin/rails server -b 0.0.0.0 -p 3000
    environment:
      ROLE: web
      RAILS_ENV: development
      DATABASE_URL: postgres://dummy:dummy@postgres:5432/dummy_rails_development
      TEST_DATABASE_URL: postgres://dummy:dummy@postgres:5432/dummy_rails_test
      REDIS_URL: redis://redis:6379
      VITE_RUBY_HOST: vite
      VITE_RUBY_PORT: 3036
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
      - rails_tmp:/app/tmp
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vite:
        condition: service_started
    tty: true
    stdin_open: true

  # Vite dev server (port 3036) — Rails proxies /vite-dev/* requests here
  vite:
    image: dummy-rails-app:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/vite dev --host 0.0.0.0
    environment:
      ROLE: vite
      RAILS_ENV: development
      VITE_RUBY_HOST: 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    ports:
      - "3036:3036"

  # Sidekiq background worker
  worker:
    image: dummy-rails-app:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq
    environment:
      ROLE: worker
      RAILS_ENV: development
      DATABASE_URL: postgres://dummy:dummy@postgres:5432/dummy_rails_development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
  node_modules:
  rails_tmp:
