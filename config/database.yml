default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://dummy:dummy@localhost:5432/dummy_rails_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgres://dummy:dummy@localhost:5432/dummy_rails_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
